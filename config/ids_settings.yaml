system:
  interface: null          # Auto-detect network interface (None)
  max_cpu_percent: 80      # psutil monitoring threshold
  log_path: "logs/guardian.log"

device_profiles:
  LightBulb:
    max_kbps: 50
    allowed_protocols: ["TCP", "MQTT"]
  IPCamera:
    max_kbps: 5000
    allowed_protocols: ["UDP", "RTP"]
  Unknown:
    max_kbps: 100
    allowed_protocols: ["TCP", "UDP", "ICMP"]

detection_settings:
  scan_threshold_packets: 100  # Number of packets considered as a scan
  time_window: 10              # Seconds

threat_signatures:
  PORT_SCAN:
    min_packet_count: 100
    max_time_gap: 1.0
    min_ports: 20
    description: "🚨 Potential Port Scanning detected (High frequency)"
  DDOS_ATTACK:
    min_kbps: 10000
    description: "🔥 Critical: Potential Outbound DDoS Attack"